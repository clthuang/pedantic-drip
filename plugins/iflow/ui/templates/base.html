<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iflow</title>
    <!-- DaisyUI v5 CSS (must be before Tailwind CSS v4) -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/daisyui.css" rel="stylesheet">
    <!-- Tailwind CSS v4 browser build -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org"></script>
</head>
<body class="min-h-screen bg-base-200">
    <div class="navbar bg-base-100 shadow-lg">
        <div class="flex-1">
            <span class="text-xl font-bold px-4">iflow</span>
            <div class="flex gap-1">
                <a href="/" class="btn btn-sm btn-ghost {{ 'btn-active' if active_page|default('') == 'board' else '' }}">Board</a>
                <a href="/entities" class="btn btn-sm btn-ghost {{ 'btn-active' if active_page|default('') == 'entities' else '' }}">Entities</a>
            </div>
        </div>
    </div>
    <main class="p-4">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
