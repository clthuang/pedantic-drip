# Guard Rules Inventory
# Feature 006: Transition Guard Audit and Rule Inventory
# Generated: 2026-03-03
# Total guards: 60
#
# Ordering: category alphabetical, file-path alphabetical within category.
#
# Enum values:
#   enforcement: hard-block | soft-warn | informational
#   enforcement_mechanism: code | markdown | convention
#   yolo_behavior: auto-select | hard-stop | skip | unchanged
#   consolidation_target: transition_gate | hook | deprecated
#   affected_phases: specify | design | create-plan | create-tasks | implement | finish
#
# Duplicate clusters (10 clusters, 27 guards involved):
#   1. Hard prerequisite definition + per-command checks: G-02, G-03, G-04, G-05, G-06, G-08
#   2. Phase sequence encodings: G-19, G-20, G-21, G-22, G-24, G-25, G-26
#   3. Branch validation (session-start vs validateAndSetup): G-10, G-11
#   4. Backward transition + validateTransition: G-18, G-22
#   5. Soft prerequisites + validateTransition: G-22, G-23
#   6. Pre-merge validation (finish-feature vs wrap-up): G-27, G-29
#   7. YOLO merge conflict hard-stop (finish-feature vs wrap-up): G-28, G-30
#   8. Task completion gate (finish-feature vs wrap-up): G-52, G-53
#   9. Fail-open MCP guards: G-13, G-14, G-15, G-16
#  10. (G-22 appears in clusters 2, 4, and 5 as the canonical phase sequence guard)

# =============================================================================
# ARTIFACT-CONTENT (2 guards)
# =============================================================================

- id: "G-01"
  name: "Test file existence reminder"
  category: "artifact-content"
  description: >
    Informational warning if no test files exist when committing. Reminds developer to run tests before committing.
  source_files:
    - file: "plugins/iflow/hooks/pre-commit-guard.sh"
      lines: "158-162"
      anchor: "has_test_files"
  trigger: "git commit command executed and no test files detected in project"
  enforcement: "informational"
  enforcement_mechanism: "code"
  affected_phases:
    - "specify"
    - "design"
    - "create-plan"
    - "create-tasks"
    - "implement"
    - "finish"
  yolo_behavior: "unchanged"
  consolidation_target: "hook"
  consolidation_notes: >
    Stays as hook. This is a general development reminder not specific to workflow transitions.
- id: "G-02"
  name: "Artifact content validation (validateArtifact)"
  category: "artifact-content"
  description: >
    4-level content validation for workflow artifacts: (1) existence, (2) non-empty > 100 bytes, (3) markdown structure with headers, (4) type-specific required sections. Used by hard prerequisite checks in commands to validate design.md, plan.md, spec.md, tasks.md.
  source_files:
    - file: "plugins/iflow/skills/workflow-state/SKILL.md"
      lines: "181-230"
      anchor: "validateArtifact()"
  trigger: >
    Phase command invocation requiring artifact validation (create-plan, create-tasks, implement)
  enforcement: "hard-block"
  enforcement_mechanism: "markdown"
  affected_phases:
    - "create-plan"
    - "create-tasks"
    - "implement"
  yolo_behavior: "unchanged"
  consolidation_target: "transition_gate"
  duplicates:
    - "G-03"
    - "G-04"
    - "G-05"
    - "G-06"
    - "G-08"
  consolidation_notes: >
    Merge with G-03 through G-06 and G-08 (per-command hard prerequisite checks and master table) into a single validate_artifact() function in transition_gate.py. The per-command BLOCKED messages become error return values from the shared function.

