<div class="card bg-base-200 shadow-sm p-3">
    <div class="font-semibold text-sm truncate">
        {{ item.type_id.split(':')[1] if ':' in item.type_id else item.type_id }}
    </div>
    <div class="text-xs text-base-content/50 truncate mt-0.5">
        {{ item.type_id }}
    </div>
    <div class="flex flex-wrap gap-1 mt-2">
        {% if item.workflow_phase %}
        <span class="badge badge-xs
            {%- if item.workflow_phase == 'wip' %} badge-primary
            {%- elif item.workflow_phase == 'blocked' %} badge-error
            {%- elif item.workflow_phase == 'completed' %} badge-success
            {%- else %} badge-ghost
            {%- endif %}">
            {{ item.workflow_phase }}
        </span>
        {% endif %}
        {% if item.mode %}
        <span class="badge badge-xs badge-ghost">{{ item.mode }}</span>
        {% endif %}
    </div>
    {% if item.last_completed_phase %}
    <div class="text-xs text-base-content/40 mt-1">
        last: {{ item.last_completed_phase }}
    </div>
    {% endif %}
</div>
