{% extends "base.html" %}

{% block title %}Board - pd{% endblock %}

{% block content %}
<div class="flex items-center justify-between mb-4">
    <h1 class="text-2xl font-bold">Kanban Board</h1>
    <button class="btn btn-sm btn-outline"
            hx-get="/"
            hx-target="#board-content"
            hx-swap="innerHTML">
        Refresh
    </button>
</div>
<div id="board-content"
     hx-get="/"
     hx-trigger="every 3s"
     hx-target="#board-content"
     hx-swap="innerHTML">
    {% include "_board_content.html" %}
</div>
{% endblock %}
