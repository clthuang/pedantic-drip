  category: "yolo-mode"
  description: >
    Detects YOLO paused state at session start with cooldown logic. Injects behavioral context about YOLO pause status and auto-resume timing.
  source_files:
    - file: "plugins/iflow/hooks/inject-secretary-context.sh"
      lines: "16-80"
      anchor: "YOLO pause"
  trigger: "Session start when yolo_mode=true and yolo_paused state detected"
  enforcement: "informational"
  enforcement_mechanism: "code"
  affected_phases:
    - "specify"
    - "design"
    - "create-plan"
    - "create-tasks"
    - "implement"
    - "finish"
  yolo_behavior: "unchanged"
  consolidation_target: "hook"
  consolidation_notes: >
    Stays as hook. Session-start context injection for YOLO pause awareness.
- id: "G-57"
  name: "YOLO usage limit circuit breaker"
  category: "yolo-mode"
  description: >
    Blocks stop tool after exceeding token usage limit (yolo_usage_limit). Sets yolo_paused state to prevent further autonomous operation. Prevents infinite autonomous loops by capping total token consumption.
  source_files:
    - file: "plugins/iflow/hooks/yolo-stop.sh"
      lines: "31-69"
      anchor: "usage_count"
  trigger: "Stop tool invocation when total session tokens exceed yolo_usage_limit"
  enforcement: "hard-block"
  enforcement_mechanism: "code"
  affected_phases:
    - "specify"
    - "design"
    - "create-plan"
    - "create-tasks"
    - "implement"
    - "finish"
  yolo_behavior: "hard-stop"
  consolidation_target: "hook"
  consolidation_notes: >
    Stays as hook. Runtime token consumption tracking. Cannot be replicated in transition_gate.
- id: "G-58"
  name: "YOLO max stop blocks safety valve"
  category: "yolo-mode"
  description: >
    Stops blocking the stop tool after hitting max_stop_blocks limit (default 50). Safety valve that prevents the stop hook from permanently blocking the user.
  source_files:
    - file: "plugins/iflow/hooks/yolo-stop.sh"
      lines: "159-169"
      anchor: "max_stop_blocks"
  trigger: "Stop tool invocation when stop_count exceeds yolo_max_stop_blocks"
  enforcement: "hard-block"
  enforcement_mechanism: "code"
  affected_phases:
    - "specify"
    - "design"
    - "create-plan"
    - "create-tasks"
    - "implement"
    - "finish"
  yolo_behavior: "hard-stop"
  consolidation_target: "hook"
  consolidation_notes: >
    Stays as hook. Safety valve for G-21 (phase continuation guard).
- id: "G-59"
  name: "YOLO stuck detection"
  category: "yolo-mode"
  description: >
    Allows stop after detecting no progress since last block (same lastCompletedPhase). Safety valve for genuinely stuck sessions where Claude cannot make progress.
  source_files:
    - file: "plugins/iflow/hooks/yolo-stop.sh"
      lines: "148-154"
      anchor: "stuck_count"
  trigger: "Stop tool invocation when stop_hook_active=true and no phase progress detected"
  enforcement: "hard-block"
  enforcement_mechanism: "code"
  affected_phases:
    - "specify"
    - "design"
    - "create-plan"
    - "create-tasks"
    - "implement"
    - "finish"
  yolo_behavior: "hard-stop"
  consolidation_target: "hook"
  consolidation_notes: >
    Stays as hook. Stuck detection requires runtime state comparison.
- id: "G-60"
  name: "Orchestrate YOLO prerequisite"
  category: "yolo-mode"
  description: >
    Blocks orchestrate mode unless YOLO mode is active. Secretary orchestrate subcommand requires yolo activation_mode for autonomous workflow execution.
  source_files:
    - file: "plugins/iflow/commands/secretary.md"
      lines: "302-313"
      anchor: "Orchestrate prerequisite"
  trigger: "/iflow:secretary orchestrate invocation when activation_mode is not yolo"
  enforcement: "hard-block"
  enforcement_mechanism: "markdown"
  affected_phases:
    - "specify"
    - "design"
    - "create-plan"
    - "create-tasks"
    - "implement"
    - "finish"
  yolo_behavior: "unchanged"
  consolidation_target: "transition_gate"
  consolidation_notes: >
    Encode as check_orchestrate_prerequisite() in transition_gate.py. Simple mode check before allowing orchestrate.
